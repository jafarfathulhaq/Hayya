<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hayya — A gentle companion for your prayers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FDFBF7;
            color: #2C2C2C;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .card {
            text-align: center;
            max-width: 400px;
        }
        .logo-circle {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #5B8C6F, #A8CBB7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            margin: 0 auto 20px;
        }
        h1 {
            font-size: 40px;
            font-weight: 700;
            color: #5B8C6F;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }
        .tagline {
            font-size: 17px;
            color: #8E8E93;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .links {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }
        a {
            color: #5B8C6F;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 20px;
            border: 1.5px solid #5B8C6F;
            border-radius: 12px;
            transition: all 0.2s;
        }
        a:hover {
            background: #5B8C6F;
            color: white;
        }
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #B5B5BA;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-circle">&#x263D;</div>
        <h1>Hayya</h1>
        <p class="tagline">A gentle companion for your prayers.</p>
        <div class="links">
            <a href="privacy-policy.html">Privacy Policy</a>
            <a href="terms-of-service.html">Terms of Service</a>
        </div>
        <p class="footer">&copy; 2026 Jafar Fathul Haq</p>
    </div>
</body>
</html>
